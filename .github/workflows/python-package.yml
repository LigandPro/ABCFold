name: Python package

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pre-commit coverage
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        python -m pip install .
    - name: Run pre-commit hooks
      run: |
        git fetch origin main
        BASE_REF="$(git merge-base HEAD origin/main)"
        pre-commit run --from-ref "$BASE_REF" --to-ref HEAD
    - name: Test with coverage
      run: |
        coverage run --source=abcfold --module pytest --verbose tests && coverage report --show-missing
    - name: Generate coverage badge
      run: |
        pip install coverage-badge
        mkdir -p .blob
        coverage-badge -o .blob/coverage.svg -f
    - name: Upload coverage badge
      uses: actions/upload-artifact@v4
      with:
        name: coverage-badge
        path: .blob/coverage.svg
