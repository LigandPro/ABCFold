min_version: 1.6.0

pre-commit:
  parallel: true
  commands:
    ruff-format-staged:
      glob: "*.{py,pyi}"
      run: uv run --extra lint ruff format --check {staged_files}

    ruff-check-staged:
      glob: "*.{py,pyi}"
      run: uv run --extra lint ruff check {staged_files}

    af3-fast-unit-smoke:
      run: uv run --extra test pytest tests/test_run_alphafold3.py tests/test_argparse.py -q

    git-diff-check:
      run: git diff --check --cached

pre-push:
  parallel: false
  commands:
    python-quality:
      run: |
        set -eu
        if upstream=$(git rev-parse --abbrev-ref --symbolic-full-name @{upstream} 2>/dev/null); then
          range="${upstream}..HEAD"
        elif git show-ref --verify --quiet refs/remotes/origin/main; then
          base="$(git merge-base HEAD origin/main)"
          range="${base}..HEAD"
        else
          range="HEAD"
        fi
        python_files="$(git diff --name-only "${range}" -- '*.py' '*.pyi' | tr '\n' ' ')"
        if [ -z "${python_files}" ]; then
          echo "[python-quality] skipped: no Python files in push range (${range})"
          exit 0
        fi
        uv run --extra lint ruff format --check ${python_files}
        uv run --extra lint ruff check ${python_files}

    pytest:
      run: uv run --extra test pytest tests/test_run_alphafold3.py tests/test_run_boltz.py tests/test_run_protenix.py tests/test_af3_to_boltz.py tests/test_af3_to_openfold.py tests/test_argparse.py tests/test_run_scripts.py tests/test_utilities.py tests/test_abcfold.py -q
